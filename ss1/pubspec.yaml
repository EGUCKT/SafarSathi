name: safarsathi
description: "Intelligent safety navigation with Guardian SOS features."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- MAPS & LOCATION ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^11.0.0 # Updated for Guardian Service
  geocoding: ^3.0.0

  # --- BACKEND & STORAGE ---
  dio: ^5.4.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # --- FIREBASE ---
  firebase_core: ^4.7.0
  firebase_database: ^12.3.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

  # --- GUARDIAN & SOS SYSTEM ---
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^21.0.0
  volume_controller: ^2.0.7
  url_launcher: ^6.2.5
  telephony: ^0.2.0
  permission_handler: ^11.3.1

  # --- STATE MANAGEMENT (RIVERPOD) ---
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # --- UI & ANIMATION ---
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0
  intl: ^0.19.0
  flutter_compass: ^0.8.1
  noise_meter: ^5.0.2
  flutter_native_splash: ^2.4.7
  shake: ^3.0.0
  wakelock_plus: ^1.5.2
  flutter_map_marker_cluster: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  
  # Ensure these folders exist in your project root!
  assets:
    - assets/images/
    - assets/icons/

flutter_native_splash:
  color: "#0a0a0f" # Premium ultra-dark grey/black
  color_dark: "#0a0a0f"
  fullscreen: true
  android_12:
    color: "#0a0a0f"
    color_dark: "#0a0a0f"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#0a0a0f"
  adaptive_icon_foreground: "assets/icons/logo.png"