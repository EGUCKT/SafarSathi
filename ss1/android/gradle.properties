# Increase memory slightly but keep it safe for 32-bit Java if needed
# 1536m is a "sweet spot" that usually works without crashing the JVM
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Standard Flutter/Android settings
android.useAndroidX=true
android.enableJetifier=true

# Keep these false for now to ensure every build is "fresh" while we debug
kotlin.incremental=false
org.gradle.caching=false

# THE FIX: Point to the 'jbr' folder which is Java 17
# Note: Use double backslashes for Windows paths
org.gradle.java.home=E:/Android studio/jbr